primary_contact:
  name: "JAY DHANWALKAR"
  email: "jaydhanwalkar123@gmail.com"   # Used for all organizer communication
  phone: "+91-8805470370"        # Used for top-50 / top-10 outreach

team_members:
  - name: "JAY DHANWALKAR"
    email: "jaydhanwalkar123@gmail.com"
    role: "Recent MCA(AI/ML) Grad"          # Optional, e.g. "Team Lead", "Backend", "Data"
  # Add more members as needed; solo participants list just one member

# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/YOUR_USERNAME/YOUR_REPO"
# Required. Must be reachable. Private repos OK if you can grant organizer
# access at Stage 3 (the email to add will be communicated then).

sandbox_link: "https://huggingface.co/spaces/dhanwalkarjay/intellirecruit"
# Required. A working hosted environment where the ranker can be run on a small
# candidate sample. See Section 10.5 of submission_spec.md for acceptable
# platforms (HuggingFace Spaces, Streamlit Cloud, Replit, Colab, Docker, Binder).

reproduce_command: "python rank.py --candidates ./candidates.jsonl --out ./submission.csv"
# The single command that produces submission.csv from candidates.jsonl.
# Should run end-to-end within 5 minutes on CPU with 16GB RAM and no network.

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Windows PC"                    # Or: "AWS EC2 c5.4xlarge", "Local Linux box", etc.
  cpu_cores: 8                                  # Number of CPU cores used
  ram_gb: 16                                    # Available RAM in GB
  python_version: "3.11.4"                      # python --version
  os: "Windows 11"                              # Or "Ubuntu 22.04 LTS", etc.
  uses_gpu_for_inference: false                 # Must be false — see compute constraints
  has_network_during_ranking: false             # Must be false — no API calls during ranking
  pre_computation_required: true               # true if you pre-compute embeddings or train models offline
  pre_computation_time_minutes: 5               # Approximate, if applicable

# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest. Stage 5 interview
# may verify these declarations against your code; declarations that contradict
# your code or your interview are flagged.
ai_tools_used:
  - "Claude"        # e.g. for architecture discussion, code review
  - "GitHub Copilot"  # e.g. for autocomplete
  # Other options: "ChatGPT", "Cursor", "Gemini", "Codeium", "Other", "None"

ai_usage_summary: |
  - Used Claude for architecture design, code review, and prompt engineering.
  - No candidate data was fed to any external LLM. All ranking logic is original code. 
  - Groq (Llama 3.1 70B) used offline for reasoning generation only — not during the ranking step.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Five-component hybrid scoring system: semantic similarity (35%) using
  all-MiniLM-L6-v2 embeddings comparing candidates against a crafted
  JD ideal-candidate text; fuzzy skill matching (30%) using rapidfuzz
  against 32 weighted required skills with proficiency weighting; experience
  fit (15%) covering years-of-experience range and product vs consulting
  background; behavioral availability (15%) from open_to_work, notice period,
  recruiter response rate, and recency; geographic fit (5%) for Pune/Noida
  target cities. Penalty multipliers: 0.0 for honeypots (6 impossibility
  rules), 0.5 for consulting-only careers, 0.7 for inactive+not-open.
  Runtime ~4-5 min on CPU for 100K candidates. Reasoning generated offline
  via Groq Llama 3.1 70B after ranking.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: true        # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true         # I have tested that my reproduce_command runs end-to-end
